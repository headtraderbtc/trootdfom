<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Royal Order of The Dark Force of Matter</title>
  <link rel="stylesheet" href="css/universe.css">
  <style>
    #splash {
      position: fixed; inset: 0;
      background: #03020a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity 1.2s ease;
    }
    #splash.fade { opacity: 0; pointer-events: none; }
    #splash .sp-emblem {
      width: 80px; opacity: 0.18; margin-bottom: 28px;
      animation: sp-pulse 2.4s ease-in-out infinite;
    }
    @keyframes sp-pulse { 0%,100%{opacity:0.14} 50%{opacity:0.28} }
    #splash .sp-title {
      font-family: 'Cinzel', serif;
      font-size: 13px; letter-spacing: 0.22em;
      color: rgba(160,110,200,0.6);
      text-transform: uppercase; text-align: center; line-height: 2;
    }
    #splash .sp-sub {
      font-family: 'Raleway', sans-serif;
      font-size: 10px; letter-spacing: 0.18em;
      color: rgba(255,255,255,0.2); text-transform: uppercase; margin-top: 14px;
      animation: sp-blink 1.6s ease-in-out infinite;
    }
    @keyframes sp-blink { 0%,100%{opacity:0.2} 50%{opacity:0.5} }
  </style>
</head>
<body>

<div id="splash">
  <svg class="sp-emblem" viewBox="0 0 100 100" fill="white" xmlns="http://www.w3.org/2000/svg">
    <polygon points="50,8 92,80 8,80" fill="white"/>
    <ellipse cx="50" cy="58" rx="11" ry="7" fill="#03020a"/>
    <circle cx="50" cy="58" r="4" fill="white"/>
    <circle cx="50" cy="58" r="1.5" fill="#03020a"/>
  </svg>
  <div class="sp-title">The Royal Order<br>of The Dark Force of Matter</div>
  <div class="sp-sub">Enter the void</div>
</div>

<canvas id="star-canvas"></canvas>

<div id="universe-scene">
  <div id="wormhole-wrap"></div>
  <div id="order-title">
    <div class="line1">The Royal Order</div>
    <div class="line2">Dark Force of Matter</div>
  </div>
</div>

<!-- PLANET SIDEBAR -->
<div id="planet-sidebar">
  <button class="ps-close" id="ps-close">&#x2715;</button>
  <div id="ps-planet-dot" class="ps-planet-dot"></div>
  <div id="ps-name"  class="ps-name"></div>
  <div id="ps-desc"  class="ps-desc"></div>
  <div id="ps-stat"  class="ps-stat"></div>
  <div class="ps-section">Worlds within this planet</div>
  <div id="ps-moons"></div>
</div>

<div id="universe-tooltip">
  <div class="tt-name"></div>
  <div class="tt-desc"></div>
  <div class="tt-stat"></div>
</div>

<div id="nav-bar">
  <span class="nav-left">
    Order Universe &nbsp;·&nbsp; Click a world to explore &nbsp;·&nbsp;
    <a href="admin/index.html" style="color:inherit;text-decoration:none;opacity:0.5;pointer-events:auto;">Admin</a>
  </span>
  <div class="nav-right">
    <div class="nav-legend"><div class="nav-pip" style="background:#4fc97a"></div>Active</div>
    <div class="nav-legend"><div class="nav-pip" style="background:#c0a83a"></div>Building</div>
    <div class="nav-legend"><div class="nav-pip" style="background:#444060"></div>Dormant</div>
    <a href="propose/index.html" class="nav-link">Propose a world</a>
    <a href="join/index.html" class="nav-link primary">Join the Order</a>
    <a href="login/index.html" class="nav-link">Sign In</a>
  </div>
</div>

<script src="js/universe.js"></script>
<script src="js/api-client.js"></script>
<script>
(function () {
  var canvas   = document.getElementById("star-canvas");
  var scene    = document.getElementById("universe-scene");
  var wormWrap = document.getElementById("wormhole-wrap");
  var titleEl  = document.getElementById("order-title");
  var tooltip  = document.getElementById("universe-tooltip");
  var sidebar  = document.getElementById("planet-sidebar");
  var splash   = document.getElementById("splash");

  var wormCtx, wormAngle = 0, raf, lastT = null;
  var cx, cy, orbitScale = 1;
  var angles  = UNIVERSE.PLANETS.map(function (p) { return p.angle; });
  var speeds  = UNIVERSE.PLANETS.map(function (p, i) { return 3.2 + i * 0.85; });
  var comets = [], cometAngles = [], cometSpeeds = [];
  var zoomed = false;

  /* ---- SPLASH ---- */
  setTimeout(function () {
    splash.classList.add("fade");
    setTimeout(function () { splash.style.display = "none"; }, 1300);
  }, 2200);

  /* ---- LIVE DATA ---- */
  async function loadLiveData() {
    try {
      var pd = await UNIVERSE.api.planets();
      if (pd && pd.planets && pd.planets.length) {
        UNIVERSE.PLANETS = pd.planets.map(function (p, i) {
          // Preserve static subProjects from the original planet if available
          var staticP = (UNIVERSE._STATIC_PLANETS || []).filter(function(s){ return s.id === p.id; })[0];
          return {
            id: p.id, name: p.name, desc: p.description,
            color: p.color, glow: p.glow,
            angle: p.angle, orbitR: p.orbitRadius,
            contributors: [],
            lastActivity: p.lastActivity ? new Date(p.lastActivity) : new Date(Date.now() - 1000*60*60*24*120),
            subUrl: p.subUrl,
            subProjects: staticP ? staticP.subProjects : []
          };
        });
        angles = UNIVERSE.PLANETS.map(function (p) { return p.angle; });
        speeds = UNIVERSE.PLANETS.map(function (p, i) { return 3.2 + i * 0.85; });
      }
    } catch (e) {
      console.log("Using static planet data:", e.message);
    }
    try {
      var cd = await UNIVERSE.api.approvedComets();
      if (cd && cd.comets) {
        comets = cd.comets.map(function (c) {
          return { name: c.name, desc: c.description, proposedBy: "a member", angle: c.angle, orbitR: c.orbit_radius };
        });
        cometAngles = comets.map(function (c) { return c.angle; });
        cometSpeeds = comets.map(function () { return 0.6 + Math.random() * 0.5; });
      }
    } catch (e) {}
    resize();
  }

  /* ---- RESIZE — key fix: orbit scale from CSS, not transform ---- */
  function resize() {
    cx = window.innerWidth / 2;
    cy = window.innerHeight / 2 - 10;
    // Scale orbit radii so they fit on small screens without distorting transforms
    var minDim = Math.min(window.innerWidth, window.innerHeight);
    orbitScale = minDim < 500 ? minDim / 520 : 1;
    UNIVERSE.drawStars(canvas);
    wormWrap.style.left = cx + "px";
    wormWrap.style.top  = cy + "px";
    titleEl.style.left  = cx + "px";
    titleEl.style.top   = cy + "px";
    rebuildScene();
  }

  /* ---- WORMHOLE ---- */
  wormCtx = UNIVERSE.initWormhole(wormWrap);

  /* ---- HELPERS ---- */
  function lighten(hex) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return "rgb("+Math.min(255,r+65)+","+Math.min(255,g+65)+","+Math.min(255,b+65)+")";
  }
  function daysAgo(d) { return Math.floor((new Date() - (d || new Date())) / 86400000); }

  /* ---- REBUILD SCENE ---- */
  function rebuildScene() {
    scene.querySelectorAll(".orbit-ring, .planet-wrap, .comet-wrap").forEach(function (el) {
      el.parentNode.removeChild(el);
    });

    UNIVERSE.PLANETS.forEach(function (p) {
      var ring = document.createElement("div");
      ring.className = "orbit-ring";
      var r = p.orbitR * orbitScale;
      ring.style.width  = (r * 2) + "px";
      ring.style.height = (r * 2) + "px";
      ring.style.left = cx + "px";
      ring.style.top  = cy + "px";
      scene.insertBefore(ring, scene.firstChild);
    });

    UNIVERSE.PLANETS.forEach(function (p, i) {
      var rad = angles[i] * Math.PI / 180;
      var r   = p.orbitR * orbitScale;
      var px  = cx + Math.cos(rad) * r;
      var py  = cy + Math.sin(rad) * r;
      var pr  = UNIVERSE.planetRadius(p);
      var ac  = UNIVERSE.activityColor(p);

      var wrap = document.createElement("div");
      wrap.className = "planet-wrap";
      wrap.dataset.idx = i;
      wrap.style.left = px + "px";
      wrap.style.top  = py + "px";

      var body = document.createElement("div");
      body.className = "planet-body";
      body.style.width  = pr + "px";
      body.style.height = pr + "px";
      body.style.background = "radial-gradient(circle at 35% 30%," + lighten(p.color) + "," + p.color + " 60%,#0d0820)";

      var pip = document.createElement("div");
      pip.className = "activity-pip";
      pip.style.background = ac;
      body.appendChild(pip);

      var label = document.createElement("div");
      label.className = "planet-label";
      label.textContent = p.name;

      wrap.appendChild(body);
      wrap.appendChild(label);
      wrap.addEventListener("mouseenter", function (e) { showTooltip(e, p); });
      wrap.addEventListener("mousemove",  function (e) { moveTooltip(e); });
      wrap.addEventListener("mouseleave", function ()  { tooltip.classList.remove("on"); });
      wrap.addEventListener("click",      function ()  { openPlanetSidebar(p); });
      scene.appendChild(wrap);
    });

    comets.forEach(function (c, i) {
      var rad = cometAngles[i] * Math.PI / 180;
      var r   = c.orbitR * orbitScale;
      var wrap = document.createElement("div");
      wrap.className = "comet-wrap";
      wrap.style.left = (cx + Math.cos(rad) * r) + "px";
      wrap.style.top  = (cy + Math.sin(rad) * r) + "px";
      var tail  = document.createElement("div"); tail.className  = "comet-tail";
      var body2 = document.createElement("div"); body2.className = "comet-body";
      var lbl   = document.createElement("div"); lbl.className   = "comet-label"; lbl.textContent = c.name;
      wrap.appendChild(tail); wrap.appendChild(body2); wrap.appendChild(lbl);
      wrap.addEventListener("mouseenter", function (e) {
        tooltip.querySelector(".tt-name").textContent = c.name + " (comet)";
        tooltip.querySelector(".tt-desc").textContent = c.desc || "";
        tooltip.querySelector(".tt-stat").textContent = "Proposed by " + c.proposedBy;
        tooltip.classList.add("on"); moveTooltip(e);
      });
      wrap.addEventListener("mousemove",  function (e) { moveTooltip(e); });
      wrap.addEventListener("mouseleave", function ()  { tooltip.classList.remove("on"); });
      scene.appendChild(wrap);
    });
  }

  /* ---- TOOLTIP ---- */
  function showTooltip(e, p) {
    var days = daysAgo(p.lastActivity);
    var status = days < 7 ? "Active" : days < 30 ? "Building" : "Dormant";
    tooltip.querySelector(".tt-name").textContent = p.name;
    tooltip.querySelector(".tt-desc").textContent = p.desc || "";
    tooltip.querySelector(".tt-stat").textContent = "Contributors: " + p.contributors.length + "  ·  " + status;
    tooltip.classList.add("on");
    moveTooltip(e);
  }
  function moveTooltip(e) {
    var tx = e.clientX + 16, ty = e.clientY - 52;
    if (tx + 190 > window.innerWidth) tx = e.clientX - 196;
    tooltip.style.left = tx + "px";
    tooltip.style.top  = ty + "px";
  }

  /* ---- PLANET SIDEBAR ---- */
  function openPlanetSidebar(p) {
    tooltip.classList.remove("on");

    // Planet dot
    var dot = document.getElementById("ps-planet-dot");
    dot.style.background = "radial-gradient(circle at 35% 30%," + lighten(p.color) + "," + p.color + " 60%,#0d0820)";

    document.getElementById("ps-name").textContent = p.name;
    document.getElementById("ps-desc").textContent = p.desc || "";

    var days   = daysAgo(p.lastActivity);
    var status = days < 7 ? "Active" : days < 30 ? "Building" : "Dormant";
    document.getElementById("ps-stat").innerHTML =
      "<span>&#9679; " + status + "</span>" +
      "<span>Contributors: " + p.contributors.length + "</span>" +
      "<span>Updated " + days + "d ago</span>";

    // Moons / sub-projects
    var moonList = document.getElementById("ps-moons");
    moonList.innerHTML = "";
    var subs = p.subProjects || [];
    if (subs.length === 0) {
      moonList.innerHTML = "<div style='font-size:11px;color:var(--text-faint);padding:10px 0;'>No sub-projects yet.</div>";
    } else {
      subs.forEach(function (sub, idx) {
        var card = document.createElement("a");
        card.className = "moon-card";
        card.href = sub.url || "#";
        if (sub.url && sub.url.startsWith("http")) card.target = "_blank";
        card.rel = "noopener noreferrer";

        var shade = shadeColor(p.color, idx);
        card.innerHTML =
          "<div class='mc-dot' style='background:" + shade + "'></div>" +
          "<div class='mc-info'>" +
            "<div class='mc-name'>" + escHtml(sub.name) + "</div>" +
            (sub.url ? "<div class='mc-url'>" + escHtml(sub.url.replace(/^https?:\/\//, '')) + "</div>" : "") +
          "</div>" +
          "<div class='mc-arrow'>&#8599;</div>";
        moonList.appendChild(card);
      });
    }

    // Zoom into clicked planet
    if (!zoomed) {
      var wrap = scene.querySelector(".planet-wrap[data-idx='" + UNIVERSE.PLANETS.indexOf(p) + "']");
      if (wrap) {
        var px = parseFloat(wrap.style.left);
        var py = parseFloat(wrap.style.top);
        var zoomFactor = window.innerWidth < 600 ? 1.6 : 2.0;
        var sidebarW   = window.innerWidth < 600 ? 0 : 170;
        scene.style.transformOrigin = px + "px " + py + "px";
        scene.style.transform = "scale(" + zoomFactor + ") translateX(-" + sidebarW + "px)";
        zoomed = true;
      }
    }

    sidebar.classList.add("open");
  }

  function closeSidebar() {
    sidebar.classList.remove("open");
    scene.style.transform = "";
    scene.style.transformOrigin = "";
    zoomed = false;
  }

  document.getElementById("ps-close").addEventListener("click", closeSidebar);

  // Click background to close sidebar
  scene.addEventListener("click", function (e) {
    if (zoomed && !e.target.closest(".planet-wrap")) closeSidebar();
  });

  function shadeColor(hex, idx) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    var factor = 0.7 + (idx % 4) * 0.15;
    return "rgb(" + Math.min(255,Math.round(r*factor)) + "," + Math.min(255,Math.round(g*factor)) + "," + Math.min(255,Math.round(b*factor)) + ")";
  }
  function escHtml(s) {
    var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML;
  }

  /* ---- ANIMATION TICK ---- */
  function tick(ts) {
    if (!lastT) lastT = ts;
    var dt = Math.min((ts - lastT) / 1000, 0.05);
    lastT = ts;

    wormAngle += dt * 0.55;
    UNIVERSE.drawWormhole(wormCtx, wormAngle);

    angles = angles.map(function (a, i) { return (a + speeds[i] * dt) % 360; });
    cometAngles = cometAngles.map(function (a, i) { return (a + (cometSpeeds[i] || 0.8) * dt) % 360; });

    var wraps = scene.querySelectorAll(".planet-wrap");
    wraps.forEach(function (el, i) {
      var rad = angles[i] * Math.PI / 180;
      var r   = UNIVERSE.PLANETS[i].orbitR * orbitScale;
      el.style.left = (cx + Math.cos(rad) * r) + "px";
      el.style.top  = (cy + Math.sin(rad) * r) + "px";
    });

    var cWraps = scene.querySelectorAll(".comet-wrap");
    cWraps.forEach(function (el, i) {
      var rad = cometAngles[i] * Math.PI / 180;
      var r   = comets[i].orbitR * orbitScale;
      el.style.left = (cx + Math.cos(rad) * r) + "px";
      el.style.top  = (cy + Math.sin(rad) * r) + "px";
    });

    raf = requestAnimationFrame(tick);
  }

  /* ---- START ---- */
  // Save static planets so we can merge subProjects after API load
  UNIVERSE._STATIC_PLANETS = UNIVERSE.PLANETS.map(function(p){ return p; });
  loadLiveData();
  window.addEventListener("resize", resize);
  raf = requestAnimationFrame(tick);
})();
</script>
</body>
</html>
