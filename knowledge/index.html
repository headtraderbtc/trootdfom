<script src="../js/universe.js"></script>
<script>
(function(){
  var PLANET_ID = "knowledge";

  /* ---- Moon definitions ---- */
  var MOON_DATA = {
    heritage: [
      { name:"Family Database", desc:"Genealogy records & family trees",      url:"", orbitR:95,  angle:30  },
      { name:"Civil Registry",  desc:"Birth, marriage & death records",       url:"", orbitR:138, angle:140 },
      { name:"Oral Archives",   desc:"Stories, legends & oral histories",     url:"", orbitR:118, angle:250 }
    ],
    knowledge: [
      { name:"Wiki",     desc:"The Order's living encyclopedia",              url:"", orbitR:95,  angle:20  },
      { name:"Library",  desc:"Documents, texts & references",                url:"", orbitR:135, angle:110 },
      { name:"Doctrine", desc:"Core philosophy & principles",                 url:"", orbitR:115, angle:210 },
      { name:"Lexicon",  desc:"Order terminology & definitions",              url:"", orbitR:155, angle:310 }
    ],
    games: [
      { name:"ZeroDominus", desc:"The flagship strategy MMO",                 url:"", orbitR:98,  angle:45  },
      { name:"Chess",       desc:"Telegram chess tournaments",                url:"", orbitR:138, angle:155 },
      { name:"Trivia",      desc:"Order knowledge challenges",                url:"", orbitR:118, angle:255 },
      { name:"Forge",       desc:"Future games in development",               url:"", orbitR:155, angle:340 }
    ],
    research: [
      { name:"Consciousness Lab", desc:"Theory of mind & philosophy",         url:"", orbitR:100, angle:35  },
      { name:"AI Division",       desc:"Machine intelligence experiments",    url:"", orbitR:140, angle:145 },
      { name:"Dark Archive",      desc:"The Order's cosmology & doctrine",    url:"", orbitR:120, angle:245 },
      { name:"Expeditions",       desc:"Member personal research projects",   url:"", orbitR:158, angle:320 }
    ],
    education: [
      { name:"Curriculum",  desc:"Order learning pathways",                    url:"", orbitR:98,  angle:60  },
      { name:"Workshops",   desc:"Member-led sessions & seminars",            url:"", orbitR:138, angle:200 }
    ]
  };

  // SAFEGUARD: Build fallback planet metrics directly so it never crashes if universe.js doesn't load globally
  var p = null;
  if (typeof UNIVERSE !== 'undefined' && UNIVERSE.PLANETS) {
    p = UNIVERSE.PLANETS.filter(function(x){ return x.id === PLANET_ID; })[0];
  }
  
  if (!p) {
    p = {
      id: "knowledge",
      name: "Knowledge Planet",
      desc: "The Order's living encyclopedia",
      color: "#6a0dad",
      glow: "#a06edc"
    };
  }

  var moons     = MOON_DATA[PLANET_ID] || [];
  var angles    = moons.map(function(m){ return m.angle; });
  var speeds    = moons.map(function(_,i){ return 3.2 + i * 1.0; });
  var canvas    = document.getElementById("star-canvas");
  var moonScene = document.getElementById("moon-scene");
  var tip       = document.getElementById("moon-tip");
  var cx, cy, orbitScale = 1, lastT = null;

  /* ---- Wormhole Setup ---- */
  var wormWrap = document.createElement("div");
  wormWrap.style.cssText = "position:absolute;z-index:2;pointer-events:none;";
  moonScene.appendChild(wormWrap);
  
  // Safely initialize wormhole animation context
  var wormCtx = (typeof UNIVERSE !== 'undefined' && UNIVERSE.initWormhole) ? UNIVERSE.initWormhole(wormWrap) : null;
  var wormAngle = 0;

  function lighten(hex) {
    var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return "rgb("+Math.min(255,r+60)+","+Math.min(255,g+60)+","+Math.min(255,b+60)+")";
  }
  
  function moonColor(baseHex, idx) {
    var r=parseInt(baseHex.slice(1,3),16), g=parseInt(baseHex.slice(3,5),16), b=parseInt(baseHex.slice(5,7),16);
    var f = 0.6 + (idx % 4) * 0.15;
    return "rgb("+Math.min(255,Math.round(r*f))+","+Math.min(255,Math.round(g*f))+","+Math.min(255,Math.round(b*f))+")";
  }

  function resize() {
    cx = window.innerWidth  / 2;
    cy = window.innerHeight / 2;
    var minDim = Math.min(window.innerWidth, window.innerHeight);
    orbitScale = minDim < 480 ? minDim / 480 : 1;

    if (typeof UNIVERSE !== 'undefined' && UNIVERSE.drawStars) {
      UNIVERSE.drawStars(canvas);
    }

    wormWrap.style.left = cx + "px";
    wormWrap.style.top  = cy + "px";
    wormWrap.style.transform = "translate(-50%,-50%)";

    var ball  = document.getElementById("ph-ball");
    var bSize = Math.max(36, Math.min(60, minDim * 0.1));
    ball.style.width      = bSize + "px";
    ball.style.height     = bSize + "px";
    ball.style.background = "radial-gradient(circle at 35% 30%,"+lighten(p.glow)+","+p.color+" 60%,#0d0820)";
    ball.style.boxShadow  = "0 0 "+(bSize*0.7)+"px "+(bSize*0.15)+"px "+p.color+"55";

    document.getElementById("ph-name").textContent   = p.name;
    document.getElementById("ph-desc").textContent   = p.desc || "";
    document.getElementById("nav-label").textContent = p.name + " · Tap a moon to enter";

    rebuildMoons();
  }

  function rebuildMoons() {
    moonScene.querySelectorAll(".moon-orbit-ring, .moon-wrap").forEach(function(el) {
      el.parentNode.removeChild(el);
    });

    moons.forEach(function(m) {
      var ring = document.createElement("div");
      ring.className = "moon-orbit-ring";
      var r = m.orbitR * orbitScale;
      ring.style.width  = (r * 2) + "px";
      ring.style.height = (r * 2) + "px";
      ring.style.left   = cx + "px";
      ring.style.top    = cy + "px";
      moonScene.insertBefore(ring, moonScene.firstChild);
    });

    moons.forEach(function(m, i) {
      var rad   = angles[i] * Math.PI / 180;
      var r     = m.orbitR * orbitScale;
      var mSize = Math.max(10, Math.round(15 * orbitScale));
      var col   = moonColor(p.color, i);

      var wrap = document.createElement("div");
      wrap.className  = "moon-wrap";
      wrap.style.left = (cx + Math.cos(rad) * r) + "px";
      wrap.style.top  = (cy + Math.sin(rad) * r) + "px";

      var body = document.createElement("div");
      body.className    = "moon-body";
      body.style.width  = mSize + "px";
      body.style.height = mSize + "px";
      body.style.background = "radial-gradient(circle at 35% 30%,"+lighten(col)+","+col+" 65%,#0a0618)";
      body.style.boxShadow  = "0 0 10px 2px " + p.color + "55";

      var lbl = document.createElement("div");
      lbl.className   = "moon-lbl";
      lbl.textContent = m.name;

      wrap.appendChild(body);
      wrap.appendChild(lbl);

      if (m.url) {
        var badge = document.createElement("div");
        badge.className   = "moon-ext-badge";
        badge.textContent = "↗ open";
        wrap.appendChild(badge);
      }

      wrap.addEventListener("mouseenter", function(e) {
        tip.querySelector(".mt-name").textContent = m.name;
        tip.querySelector(".mt-desc").textContent = m.desc + (m.url ? " — external link" : " — coming soon");
        tip.classList.add("on");
        tip.style.left = (e.clientX + 14) + "px";
        tip.style.top  = (e.clientY - 48) + "px";
      });
      wrap.addEventListener("mousemove", function(e) {
        tip.style.left = (e.clientX + 14) + "px";
        tip.style.top  = (e.clientY - 48) + "px";
      });
      wrap.addEventListener("mouseleave", function() { tip.classList.remove("on"); });

      wrap.addEventListener("click", function() {
        tip.classList.remove("on");
        if (m.url) {
          window.open(m.url, "_blank", "noopener noreferrer");
        } else {
          tip.querySelector(".mt-name").textContent = m.name;
          tip.querySelector(".mt-desc").textContent = "This world is not yet linked to an external page.";
          tip.classList.add("on");
          tip.style.left = (cx + 20) + "px";
          tip.style.top  = (cy - 60) + "px";
          setTimeout(function(){ tip.classList.remove("on"); }, 2500);
        }
      });

      moonScene.appendChild(wrap);
    });
  }

  function tick(ts) {
    if (!lastT) lastT = ts;
    var dt = Math.min((ts - lastT) / 1000, 0.05);
    lastT = ts;

    if (wormCtx && typeof UNIVERSE !== 'undefined' && UNIVERSE.drawWormhole) {
      wormAngle += dt * 0.55;
      UNIVERSE.drawWormhole(wormCtx, wormAngle);
    }

    angles = angles.map(function(a, i) { return (a + speeds[i] * dt) % 360; });

    moonScene.querySelectorAll(".moon-wrap").forEach(function(el, i) {
      var rad = angles[i] * Math.PI / 180;
      var r   = moons[i].orbitR * orbitScale;
      el.style.left = (cx + Math.cos(rad) * r) + "px";
      el.style.top  = (cy + Math.sin(rad) * r) + "px";
    });

    requestAnimationFrame(tick);
  }

  resize();
  window.addEventListener("resize", resize);
  requestAnimationFrame(tick);
})();
</script>
